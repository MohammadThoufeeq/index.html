<!DOCTYPE html>
<html>
<head>
    <title>Grid Layout</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
        }

        .container{
            width:900px;
            height:500px;
            border:3px solid #000;
            display:grid;
            grid-template-columns: 1fr 2fr 1fr 1fr;
            grid-template-rows: 80px 100px 150px 150px;
            gap:2px;
            background:#000;
        }

        .box{
            background:white;
            border:1px solid #000;
        }

        .box1{grid-column:1/2; grid-row:1/2;}
        .box2{grid-column:2/3; grid-row:1/2;}
        .box3{grid-column:3/4; grid-row:1/2;}
        .box4{grid-column:4/5; grid-row:1/2;}

        .box5{grid-column:1/3; grid-row:2/3;}
        .box6{grid-column:3/4; grid-row:2/3;}
        .box7{grid-column:4/5; grid-row:2/3;}

        .box8{grid-column:1/2; grid-row:3/5;}
        .box9{grid-column:2/3; grid-row:3/4;}
        .box10{grid-column:2/3; grid-row:4/5;}

        .box11{grid-column:3/5; grid-row:3/5; padding:20px;}

        .inner{
            width:100%;
            height:100%;
            border:2px solid #000;
            display:grid;
            grid-template-columns:1fr 1fr;
            grid-template-rows:1fr 1fr;
        }

        .inner div{
            border:1px solid #000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>

    <div class="box box5"></div>
    <div class="box box6"></div>
    <div class="box box7"></div>

    <div class="box box8"></div>
    <div class="box box9"></div>
    <div class="box box10"></div>

    <div class="box box11">
        <div class="inner">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
</div>

</body>
</html>
